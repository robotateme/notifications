services:
    laravel.test:
        build:
            context: './vendor/laravel/sail/runtimes/8.5'
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP:-1000}'
        image: 'sail-8.5/app'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            WWWUSER: '${WWWUSER:-1000}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            pgsql:
                condition: service_healthy
            kafka:
                condition: service_healthy
    pgsql:
        image: 'postgres:18-alpine'
        ports:
            - '${FORWARD_DB_PORT:-5432}:5432'
        environment:
            PGPASSWORD: '${DB_PASSWORD:-password}'
            POSTGRES_DB: '${DB_DATABASE:-laravel}'
            POSTGRES_USER: '${DB_USERNAME:-sail}'
            POSTGRES_PASSWORD: '${DB_PASSWORD:-password}'
        volumes:
            - 'sail-pgsql:/var/lib/postgresql/data'
            - './vendor/laravel/sail/database/pgsql/create-testing-database.sql:/docker-entrypoint-initdb.d/10-create-testing-database.sql'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - pg_isready
                - '-q'
                - '-d'
                - '${DB_DATABASE:-laravel}'
                - '-U'
                - '${DB_USERNAME:-sail}'
            retries: 3
            timeout: 5s
    kafka:
        image: 'bitnami/kafka:3.7'
        ports:
            - '${FORWARD_KAFKA_PORT:-19092}:19092'
        environment:
            KAFKA_CFG_NODE_ID: 1
            KAFKA_CFG_PROCESS_ROLES: controller,broker
            KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
            KAFKA_CFG_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:19092'
            KAFKA_CFG_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092,EXTERNAL://localhost:${FORWARD_KAFKA_PORT:-19092}'
            KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT'
            KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
            KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
            KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: 'true'
            ALLOW_PLAINTEXT_LISTENER: 'yes'
        networks:
            - sail
        healthcheck:
            test:
                - CMD-SHELL
                - kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1
            retries: 10
            timeout: 10s
    kafka-ui:
        image: 'provectuslabs/kafka-ui:latest'
        ports:
            - '${FORWARD_KAFKA_UI_PORT:-8081}:8080'
        environment:
            KAFKA_CLUSTERS_0_NAME: local
            KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
        networks:
            - sail
        depends_on:
            kafka:
                condition: service_healthy
networks:
    sail:
        driver: bridge
volumes:
    sail-pgsql:
        driver: local
