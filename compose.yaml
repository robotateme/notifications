services:
    laravel.test:
        build:
            context: .
            dockerfile: docker/app/Dockerfile
        image: 'notifications-app:latest'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        working_dir: /var/www/html
        command: >
            sh -c "composer install &&
            test -f .env || cp .env.example .env &&
            php artisan key:generate --force --no-interaction &&
            php artisan migrate --force &&
            php artisan serve --host=0.0.0.0 --port=80"
        environment:
            WWWUSER: '${WWWUSER:-1000}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            pgsql:
                condition: service_healthy
            kafka:
                condition: service_healthy
            kafka-rest:
                condition: service_started
            redis:
                condition: service_healthy
    queue.worker:
        build:
            context: .
            dockerfile: docker/app/Dockerfile
        image: 'notifications-app:latest'
        working_dir: /var/www/html
        command: >
            sh -c "while [ ! -f vendor/autoload.php ]; do sleep 1; done &&
            php artisan queue:work --queue=notifications-high,notifications --tries=3"
        environment:
            WWWUSER: '${WWWUSER:-1000}'
            LARAVEL_SAIL: 1
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            laravel.test:
                condition: service_started
    outbox.publisher:
        build:
            context: .
            dockerfile: docker/app/Dockerfile
        image: 'notifications-app:latest'
        working_dir: /var/www/html
        command: >
            sh -c "while [ ! -f vendor/autoload.php ]; do sleep 1; done &&
            while true; do php artisan outbox:publish --limit=100; sleep 5; done"
        environment:
            WWWUSER: '${WWWUSER:-1000}'
            LARAVEL_SAIL: 1
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            laravel.test:
                condition: service_started
    pgsql:
        image: 'postgres:18-alpine'
        ports:
            - '${FORWARD_DB_PORT:-5432}:5432'
        environment:
            PGPASSWORD: '${DB_PASSWORD:-password}'
            POSTGRES_DB: '${DB_DATABASE:-laravel}'
            POSTGRES_USER: '${DB_USERNAME:-sail}'
            POSTGRES_PASSWORD: '${DB_PASSWORD:-password}'
        volumes:
            - 'sail-pgsql:/var/lib/postgresql/data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - pg_isready
                - '-q'
                - '-d'
                - '${DB_DATABASE:-laravel}'
                - '-U'
                - '${DB_USERNAME:-sail}'
            retries: 3
            timeout: 5s
    kafka:
        image: 'apache/kafka:3.9.0'
        ports:
            - '${FORWARD_KAFKA_PORT:-19092}:19092'
        environment:
            KAFKA_NODE_ID: 1
            KAFKA_PROCESS_ROLES: controller,broker
            KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
            KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:19092'
            KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092,EXTERNAL://localhost:${FORWARD_KAFKA_PORT:-19092}'
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT'
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
            KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
            CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
        networks:
            - sail
        healthcheck:
            test:
                - CMD-SHELL
                - /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1
            retries: 10
            timeout: 10s
    kafka-ui:
        image: 'provectuslabs/kafka-ui:latest'
        ports:
            - '${FORWARD_KAFKA_UI_PORT:-8081}:8080'
        environment:
            KAFKA_CLUSTERS_0_NAME: local
            KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
        networks:
            - sail
        depends_on:
            kafka:
                condition: service_healthy
    kafka-rest:
        image: 'confluentinc/cp-kafka-rest:7.7.1'
        ports:
            - '${FORWARD_KAFKA_REST_PORT:-8082}:8082'
        environment:
            KAFKA_REST_HOST_NAME: kafka-rest
            KAFKA_REST_BOOTSTRAP_SERVERS: 'PLAINTEXT://kafka:9092'
            KAFKA_REST_LISTENERS: 'http://0.0.0.0:8082'
        networks:
            - sail
        depends_on:
            kafka:
                condition: service_healthy
    redis:
        image: 'redis:7-alpine'
        command: redis-server --appendonly yes
        ports:
            - '${FORWARD_REDIS_PORT:-6379}:6379'
        volumes:
            - 'sail-redis:/data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s
networks:
    sail:
        driver: bridge
volumes:
    sail-pgsql:
        driver: local
    sail-redis:
        driver: local
